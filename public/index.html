<!DOCTYPE html>
<html>
<head>
    <title>BioLab Sync | Unit 4</title>
    <script src="https://cdn.jsdelivr.net/npm/@titaniumnetwork-dev/ultraviolet@3.2.7/dist/uv.bundle.js"></script>
    <script src="/portal/settings.data.js"></script>
</head>
<body style="font-family: sans-serif; background: #f4f7f6; text-align: center; padding-top: 80px;">
    <h1>Unit 4: Field Data Entry</h1>
    <p>Enter Researcher ID to sync local lab notes.</p>
    <input id="q" type="text" placeholder="Researcher ID..." style="padding:15px; width:300px;">
    <button onclick="launch()" style="padding:15px 25px; background:#27ae60; color:white; border:none; cursor:pointer;">Sync Data</button>

    <script>
    function launch() {
        const val = document.getElementById('q').value;
        const url = val.includes('.') ? (val.startsWith('http') ? val : 'https://' + val) : 'https://www.google.com/search?q=' + encodeURIComponent(val);
        // Uses the prefix defined in /portal/settings.data.js
        window.location.href = __uv$config.prefix + __uv$config.encodeUrl(url);
    }
    // Panic Key
    document.addEventListener('keydown', (e) => { if(e.key === "Escape") window.location.href = "https://classroom.google.com"; });
    </script>
</body>
</html>
